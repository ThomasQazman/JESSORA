<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JESOORA - لوحة التحكم</title>
  <link rel="stylesheet" href="admin.css">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="admin-wrapper">
    
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="logo">
        <span class="icon">✝</span>
        <div>
          <h2>JESOORA</h2>
          <small>لوحة التحكم</small>
        </div>
      </div>
      
      <nav class="nav-menu">
        <button class="nav-btn active" data-tab="products">
          <span>🛍️</span> المنتجات
        </button>
        <button class="nav-btn" data-tab="categories">
          <span>📂</span> التصنيفات
        </button>
        <button class="nav-btn" data-tab="stats">
          <span>📊</span> الإحصائيات
        </button>
        <button class="nav-btn" data-tab="testimonials">
          <span>💬</span> آراء العملاء
        </button>
        <button class="nav-btn" data-tab="settings">
          <span>⚙️</span> الإعدادات العامة
        </button>
      </nav>
      
      <div class="sidebar-footer">
        <a href="index.html" class="back-link">← العودة للموقع</a>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="top-bar">
        <h1 id="page-title">المنتجات</h1>
        <div class="actions">
          <button class="btn btn-primary" onclick="exportConfig()">
            📥 تصدير الكود
          </button>
        </div>
      </header>

      <!-- Tab: Products -->
      <section id="tab-products" class="tab-content active">
        <div class="toolbar">
          <button class="btn btn-success" onclick="openProductModal()">
            ➕ إضافة منتج جديد
          </button>
          <div class="search-box">
            <input type="text" id="productSearch" placeholder="ابحث في المنتجات..." oninput="filterProducts()">
          </div>
        </div>
        
        <div class="table-container">
          <table class="data-table">
            <thead>
              <tr>
                <th>#</th>
                <th>الأيقونة</th>
                <th>الاسم</th>
                <th>التصنيف</th>
                <th>السعر</th>
                <th>الخامة</th>
                <th>الحالة</th>
                <th>الإجراءات</th>
              </tr>
            </thead>
            <tbody id="productsTableBody"></tbody>
          </table>
        </div>
      </section>

      <!-- Tab: Categories -->
      <section id="tab-categories" class="tab-content">
        <div class="toolbar">
          <button class="btn btn-success" onclick="openCategoryModal()">
            ➕ إضافة تصنيف
          </button>
        </div>
        <div class="cards-grid" id="categoriesGrid"></div>
      </section>

      <!-- Tab: Stats -->
      <section id="tab-stats" class="tab-content">
        <div class="stats-editor">
          <div class="form-grid" id="statsForm"></div>
        </div>
      </section>

      <!-- Tab: Testimonials -->
      <section id="tab-testimonials" class="tab-content">
        <div class="toolbar">
          <button class="btn btn-success" onclick="openTestimonialModal()">
            ➕ إضافة رأي
          </button>
        </div>
        <div class="cards-grid" id="testimonialsGrid"></div>
      </section>

      <!-- Tab: Settings -->
      <section id="tab-settings" class="tab-content">
        <div class="settings-form" id="settingsForm"></div>
      </section>
    </main>
  </div>

  <!-- Modal: Product -->
  <div class="modal" id="productModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="productModalTitle">إضافة منتج</h3>
        <button class="close-btn" onclick="closeModal('productModal')">×</button>
      </div>
      <form id="productForm" onsubmit="saveProduct(event)">
        <input type="hidden" id="productId">
        <div class="form-row">
          <div class="form-group">
            <label>الأيقونة (إيموجي)</label>
            <input type="text" id="pIcon" required placeholder="مثال: 🖼️">
          </div>
          <div class="form-group">
            <label>التصنيف</label>
            <select id="pCat" required></select>
          </div>
        </div>
        <div class="form-group">
          <label>اسم المنتج</label>
          <input type="text" id="pName" required>
        </div>
        <div class="form-group">
          <label>وصف قصير</label>
          <input type="text" id="pShort" required>
        </div>
        <div class="form-group">
          <label>وصف تفصيلي</label>
          <textarea id="pDesc" rows="3" required></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>السعر (أرقام إنجليزية)</label>
            <input type="number" id="pPrice" required>
          </div>
          <div class="form-group">
            <label>السعر بالعربي</label>
            <input type="text" id="pPriceAr" required placeholder="مثال: ٤٥٠">
          </div>
        </div>
        <div class="form-group">
          <label>الخامة</label>
          <input type="text" id="pMat" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>الشارة</label>
            <select id="pBadge">
              <option value="">بدون</option>
              <option value="جديد">جديد</option>
              <option value="الأكثر طلبًا">الأكثر طلبًا</option>
              <option value="محدود">محدود</option>
            </select>
          </div>
          <div class="form-group">
            <label>لون الخلفية (gradient)</label>
            <input type="text" id="pBg" required placeholder="linear-gradient(135deg,#2C1A0E,#5C3415)">
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="closeModal('productModal')">إلغاء</button>
          <button type="submit" class="btn btn-primary">حفظ</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal: Category -->
  <div class="modal" id="categoryModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>إضافة/تعديل تصنيف</h3>
        <button class="close-btn" onclick="closeModal('categoryModal')">×</button>
      </div>
      <form id="categoryForm" onsubmit="saveCategory(event)">
        <input type="hidden" id="catIndex">
        <div class="form-group">
          <label>الاسم</label>
          <input type="text" id="catName" required>
        </div>
        <div class="form-group">
          <label>الأيقونة</label>
          <input type="text" id="catIcon" required placeholder="مثال: 🖼️">
        </div>
        <div class="form-group">
          <label>الوصف</label>
          <input type="text" id="catDesc" required>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="closeModal('categoryModal')">إلغاء</button>
          <button type="submit" class="btn btn-primary">حفظ</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal: Testimonial -->
  <div class="modal" id="testimonialModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>إضافة/تعديل رأي</h3>
        <button class="close-btn" onclick="closeModal('testimonialModal')">×</button>
      </div>
      <form id="testimonialForm" onsubmit="saveTestimonial(event)">
        <input type="hidden" id="testIndex">
        <div class="form-group">
          <label>النص</label>
          <textarea id="testText" rows="3" required></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>الاسم</label>
            <input type="text" id="testName" required>
          </div>
          <div class="form-group">
            <label>الموقع</label>
            <input type="text" id="testLocation" required>
          </div>
        </div>
        <div class="form-group">
          <label>الحرف الأول</label>
          <input type="text" id="testInitial" required maxlength="1">
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="closeModal('testimonialModal')">إلغاء</button>
          <button type="submit" class="btn btn-primary">حفظ</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Export Modal -->
  <div class="modal" id="exportModal">
    <div class="modal-content modal-lg">
      <div class="modal-header">
        <h3>📋 انسخ الكود ده وحطه مكان الكود القديم في ملف config.js</h3>
        <button class="close-btn" onclick="closeModal('exportModal')">×</button>
      </div>
      <div class="export-box">
        <textarea id="exportCode" readonly></textarea>
        <button class="btn btn-primary" onclick="copyCode()">📋 نسخ الكود</button>
      </div>
    </div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
